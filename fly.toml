# fly.toml app configuration file generated for sealdex on 2026-04-25T20:12:35+08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'sealdex'
primary_region = 'iad'
kill_signal = 'SIGTERM'
kill_timeout = '30s'

[build]
  dockerfile = 'Dockerfile'

[env]
  CYCLE_INTERVAL_SEC = '600'
  EPHEMERAL_RPC_URL = 'https://devnet-tee.magicblock.app'
  NODE_ENV = 'production'
  PORT = '3000'
  SEALDEX_IDL_PATH = '/app/target/idl/sealdex_auction.json'
  SEALDEX_KEYS_DIR = '/data/.keys'
  SEALDEX_STATE_DIR = '/data/state'
  SOLANA_RPC_URL = 'https://api.devnet.solana.com'

# Required Fly secrets (set with `fly secrets set NAME=...`):
#   ANTHROPIC_API_KEY        — operator's Anthropic key for the demo bidders
#   SEALDEX_SESSION_SECRET   — 32+ char random; HMAC + AES-256-GCM master
#                              for the BYOK pipeline. Rotation invalidates
#                              outstanding sessions AND existing encrypted
#                              creds — never rotate without first wiping
#                              /data/state/spawns/.
#   SELLER_KEYPAIR_B64,
#   BIDDER1_KEYPAIR_B64,
#   BIDDER2_KEYPAIR_B64      — base64 of the JSON-array keypair files.
#                              Decoded onto the volume on first boot.
# Optional:
#   SEALDEX_BYOK=0           — disables the BYOK spawn-worker (still runs the
#                              demo bidders + frontend), for debugging.

[[mounts]]
  source = 'sealdex_data'
  destination = '/data'
  initial_size = '1gb'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = '20s'
    interval = '30s'
    method = 'GET'
    timeout = '5s'
    path = '/api/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
